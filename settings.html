<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>設定｜哲哲❤️臻臻的小天地</title>
    <link rel="stylesheet" href="./styles.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <aside class="sidebar" aria-label="主選單">
      <div class="sidebar-brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
          <rect width="48" height="48" rx="16"></rect>
          <circle cx="17" cy="19" r="4.2"></circle>
          <circle cx="24" cy="15" r="4.2"></circle>
          <circle cx="31" cy="19" r="4.2"></circle>
          <path d="M15.5 31.2c0-5 3.7-9 8.5-9s8.5 4 8.5 9c0 3.2-2.3 5-5 4.2-1.6-.5-3.4-.5-5 0-2.7.8-5-.6-5-4.2Z"></path>
        </svg>
        <strong>Wealth<br />Dashboard</strong>
      </div>
      <nav class="sidebar-nav">
        <a href="./index.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.2 12 4l8 7.2"></path><path d="M6.5 10.5V20h5v-5h3v5h5v-9.5"></path></svg>
          總覽
        </a>
        <a class="active" href="./settings.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1L14.5 3h-5l-.3 3.1a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7.6 7.6 0 0 0 1.7 1l.3 3.1h5l.3-3.1a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z"></path></svg>
          設定
        </a>
      </nav>
    </aside>

    <main>
      <section class="settings-header" aria-label="設定">
        <p class="eyebrow">System</p>
        <h1>設定</h1>
      </section>

      <section class="panel full diagnostics-panel" aria-label="System Diagnostics">
        <div class="panel-title">
          <div>
            <p class="eyebrow">System Diagnostics</p>
            <h2>系統診斷</h2>
          </div>
          <button class="action-button" id="refreshDiagnosticsButton" type="button">重新整理</button>
        </div>
        <div id="diagnosticsGrid" class="diagnostics-grid"></div>
      </section>

      <section class="panel full diagnostics-panel" aria-label="Data Health">
        <div class="panel-title">
          <div>
            <p class="eyebrow">Data Health</p>
            <h2>一鍵健康檢查</h2>
          </div>
          <div class="settings-action-groups">
            <div class="settings-action-group" aria-label="一般操作">
              <span>一般操作</span>
              <button class="action-button" id="runHealthCheckButton" type="button">檢查網站狀態</button>
              <button class="action-button subtle-action" id="createBackupButton" type="button">建立備份</button>
            </div>
            <div class="settings-action-group repair-actions" aria-label="修復工具">
              <span>修復工具</span>
              <button class="action-button" id="repairDataButton" type="button" hidden>一鍵修復</button>
              <button class="action-button subtle-action" id="rebuildPortfolioButton" type="button">重建首頁資料</button>
              <button class="action-button subtle-action" id="recheckHoldingsButton" type="button">重新校正持股</button>
            </div>
          </div>
        </div>
        <div id="dataHealthConclusion" class="health-conclusion">尚未檢查</div>
        <div id="dataHealthGrid" class="diagnostics-grid"></div>
        <div id="consistencyGrid" class="diagnostics-grid"></div>
        <p id="dataHealthNote" class="settings-note"></p>
      </section>

      <section class="panel full diagnostics-panel" aria-label="Version">
        <div class="panel-title">
          <div>
            <p class="eyebrow">Version</p>
            <h2>目前版本</h2>
          </div>
        </div>
        <div id="versionGrid" class="diagnostics-grid"></div>
      </section>
    </main>

    <script>
      const diagnosticsRows = [
        ["Database", "database"],
        ["Status", "status"],
        ["Fallback", "fallback"],
        ["Last Import Time", "lastImport"],
        ["Transactions Count", "transactions"],
        ["Accounts Count", "accounts"],
      ];

      function formatDiagnosticsDate(value) {
        if (!value) return "尚未記錄";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        const year = date.getFullYear() - 1911;
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${year}/${month}/${day} ${hour}:${minute}`;
      }

      function diagnosticsValues(status) {
        return {
          database: status.currentDbLabel || "讀取中",
          status: status.currentDb === "supabase" && !status.fallbackActive ? "Online" : "Fallback",
          fallback: status.fallbackActive ? "Enabled" : "Disabled",
          lastImport: formatDiagnosticsDate(status.metadata?.lastImport),
          transactions: status.counts?.transactions ?? 0,
          accounts: status.counts?.accounts ?? 0,
        };
      }

      function renderDiagnostics(status) {
        const values = diagnosticsValues(status);
        document.getElementById("diagnosticsGrid").innerHTML = diagnosticsRows
          .map(([label, key]) => `<article class="diagnostics-card">
            <span>${label}</span>
            <strong>${values[key]}</strong>
          </article>`)
          .join("");
      }

      function formatHealthValue(value) {
        if (!value) return "尚未記錄";
        if (typeof value === "object" && value.createdAt) return formatDiagnosticsDate(value.createdAt);
        return formatDiagnosticsDate(value);
      }

      function healthLabel(ok) {
        return ok ? "正常" : "異常";
      }

      function healthAdvice(payload, pricePayload = null) {
        if (payload.summary?.title) {
          const priceOk = pricePayload?.ok || pricePayload?.updating || payload.priceApiOk;
          if (!priceOk && payload.summary.tone === "success") {
            return { tone: "success", text: "資料保存正常，可以輸入資料；股價更新暫時不穩，晚點再更新即可。" };
          }
          return { tone: payload.summary.tone || "success", text: payload.summary.title };
        }
        const formalDataOk = payload.status?.currentDb === "supabase" && !payload.status?.fallbackActive;
        if (!payload.authOk) return { tone: "error", text: "登入狀態異常，請重新登入後再操作。" };
        if (!payload.readOk) return { tone: "error", text: "Supabase 目前讀取異常，先不要新增或修改資料。" };
        if (!payload.writeOk) return { tone: "error", text: "Supabase 目前無法寫入，先不要新增交易、股息或更新資產。" };
        if (!formalDataOk) return { tone: "error", text: "目前不是正式資料狀態，先不要新增或修改重要資料。" };
        if ((!pricePayload?.ok && !pricePayload?.updating) || !payload.priceApiOk) return { tone: "success", text: "資料保存正常，可以輸入資料；股價更新暫時不穩，晚點再更新即可。" };
        return { tone: "success", text: "網站狀態正常，可以放心輸入資料。" };
      }

      function renderDataHealth(payload, pricePayload = null) {
        const backup = payload.lastAutoBackup || payload.backup || {};
        const formalDataOk = payload.status?.currentDb === "supabase" && !payload.status?.fallbackActive;
        const advice = healthAdvice(payload, pricePayload);
        const items = [
          ["登入狀態", healthLabel(payload.authOk)],
          ["Supabase 可讀", healthLabel(payload.readOk)],
          ["Supabase 可寫", healthLabel(payload.writeOk)],
          ["正式資料", formalDataOk ? "正常" : "請確認"],
          ["股價更新", pricePayload?.updating ? "更新中" : (pricePayload?.ok ? "正常" : healthLabel(payload.priceApiOk))],
          ["最近成功保存", formatHealthValue(payload.lastSuccessfulSave)],
          ["首頁最近重算", formatHealthValue(payload.lastPortfolioRebuild)],
          ["最近自動備份", formatHealthValue(backup)],
          ["最近股價更新", formatHealthValue(payload.lastPriceUpdate)],
        ];
        const conclusion = document.getElementById("dataHealthConclusion");
        conclusion.className = `health-conclusion ${advice.tone}`;
        conclusion.textContent = advice.text;
        document.getElementById("dataHealthGrid").innerHTML = items
          .map(([label, value]) => `<article class="diagnostics-card">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>`)
          .join("");
        renderConsistencyChecks(payload.consistencyChecks || []);
        const issues = [...(payload.anomalies || [])];
        if (!pricePayload?.ok && !pricePayload?.updating) issues.push("股價更新 API 目前檢查失敗。");
        updateRepairButton(payload, pricePayload);
        document.getElementById("dataHealthNote").textContent = issues.length
          ? issues.join(" ")
          : payload.summary?.action || "沒有發現需要處理的問題。";
      }

      function updateRepairButton(payload, pricePayload = null) {
        const button = document.getElementById("repairDataButton");
        if (!button) return;
        const failedConsistency = (payload.consistencyChecks || []).some((item) => !item.ok);
        const rebuildOutdated = (payload.anomalies || []).some((item) => String(item).includes("首頁資料重算時間"));
        const dataRepairable = Boolean(payload.readOk && payload.writeOk && (failedConsistency || rebuildOutdated));
        const priceOnlyIssue = !pricePayload?.ok && !failedConsistency && !rebuildOutdated;
        button.hidden = !dataRepairable || priceOnlyIssue;
      }

      function renderConsistencyChecks(checks) {
        const target = document.getElementById("consistencyGrid");
        if (!target) return;
        if (!checks.length) {
          target.innerHTML = "";
          return;
        }
        target.innerHTML = checks
          .map((item) => `<article class="diagnostics-card">
            <span>${item.label || "資料檢查"}</span>
            <strong>${item.ok ? "通過" : "請確認"}</strong>
            <small>${item.detail || ""}</small>
          </article>`)
          .join("");
      }

      async function readJsonSafely(response) {
        try {
          return await response.json();
        } catch {
          return { ok: false, detail: response.status === 401 ? "登入已過期，請重新登入。" : "檢查結果讀取失敗。" };
        }
      }

      async function loadVersion() {
        const target = document.getElementById("versionGrid");
        target.innerHTML = '<article class="diagnostics-card"><span>Version</span><strong>讀取中</strong></article>';
        try {
          const response = await fetch("/api/app-version", { cache: "no-store" });
          const payload = await readJsonSafely(response);
          if (!response.ok) throw new Error(payload.detail || "版本讀取失敗");
          target.innerHTML = [
            ["版本", payload.label || "正式版"],
            ["部署代碼", payload.version || "尚未記錄"],
          ].map(([label, value]) => `<article class="diagnostics-card">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>`).join("");
        } catch (error) {
          target.innerHTML = `<article class="diagnostics-card">
            <span>Version</span>
            <strong>讀取失敗</strong>
            <small>${error.message || "請稍後再試"}</small>
          </article>`;
        }
      }

      async function loadDataHealth() {
        const target = document.getElementById("dataHealthGrid");
        target.innerHTML = '<article class="diagnostics-card"><span>Status</span><strong>檢查中</strong></article>';
        try {
          const [healthResult, priceResult] = await Promise.allSettled([
            fetch("/api/data-health", { cache: "no-store" }),
            fetch("/api/price-health", { cache: "no-store" }),
          ]);
          if (healthResult.status !== "fulfilled") throw new Error("資料健康檢查失敗");
          const response = healthResult.value;
          const priceResponse = priceResult.status === "fulfilled" ? priceResult.value : null;
          const payload = await readJsonSafely(response);
          const pricePayload = priceResponse ? await readJsonSafely(priceResponse) : { ok: false, detail: "股價檢查暫時失敗" };
          if (!response.ok) throw new Error(payload.detail || "資料健康檢查失敗");
          renderDataHealth(payload, pricePayload);
        } catch (error) {
          target.innerHTML = `<article class="diagnostics-card">
            <span>Status</span>
            <strong>檢查失敗</strong>
            <small>${error.message || "請稍後再試"}</small>
          </article>`;
        }
      }

      async function runHealthCheck() {
        const button = document.getElementById("runHealthCheckButton");
        button.disabled = true;
        button.textContent = "檢查中...";
        await loadDataHealth();
        button.disabled = false;
        button.textContent = "檢查網站狀態";
      }

      async function createBackup() {
        const button = document.getElementById("createBackupButton");
        button.disabled = true;
        button.textContent = "建立中...";
        try {
          const response = await fetch("/api/db/auto-backup", { method: "POST" });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "備份建立失敗");
          document.getElementById("dataHealthNote").textContent = `備份完成：${payload.backup?.name || ""}`;
          await loadDataHealth();
        } catch (error) {
          document.getElementById("dataHealthNote").textContent = error.message || "備份建立失敗";
        } finally {
          button.disabled = false;
          button.textContent = "建立備份";
        }
      }

      async function postMaintenanceAction(buttonId, loadingText, doneText, endpoint) {
        const button = document.getElementById(buttonId);
        button.disabled = true;
        button.textContent = loadingText;
        try {
          const response = await fetch(endpoint, { method: "POST", cache: "no-store" });
          const payload = await readJsonSafely(response);
          if (!response.ok || payload.ok === false) throw new Error(payload.detail || "操作失敗，請稍後再試。");
          const checks = payload.consistencyChecks || [];
          const passed = checks.filter((item) => item.ok).length;
          const checkNote = checks.length ? `，一致性檢查 ${passed}/${checks.length} 通過` : "";
          const correctionRows = payload.correctionSummary || [];
          const correctionNote = correctionRows.length
            ? `，${correctionRows.map((item) => `${item.label}${item.ok ? "通過" : "請確認"}`).join("、")}`
            : "";
          document.getElementById("dataHealthNote").textContent = `${doneText}：${formatHealthValue(payload.savedAt || new Date().toISOString())}${checkNote}${correctionNote}`;
          await Promise.all([loadDiagnostics(), loadDataHealth()]);
        } catch (error) {
          document.getElementById("dataHealthNote").textContent = error.message || "操作失敗，請稍後再試。";
        } finally {
          button.disabled = false;
          button.textContent = doneText;
        }
      }

      function rebuildPortfolio() {
        return postMaintenanceAction("rebuildPortfolioButton", "重建中...", "重建首頁資料", "/api/db/rebuild-portfolio");
      }

      function recheckHoldings() {
        return postMaintenanceAction("recheckHoldingsButton", "校正中...", "重新校正持股", "/api/corporate-actions/recheck-holdings");
      }

      function repairDataHealth() {
        return postMaintenanceAction("repairDataButton", "修復中...", "一鍵修復", "/api/db/repair-data-health");
      }

      async function loadDiagnostics() {
        const target = document.getElementById("diagnosticsGrid");
        target.innerHTML = '<article class="diagnostics-card"><span>Status</span><strong>讀取中</strong></article>';
        try {
          const statusUrl = new URL("/api/db/status", window.location.origin);
          const response = await fetch(statusUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          renderDiagnostics(await response.json());
        } catch (error) {
          target.innerHTML = `<article class="diagnostics-card">
            <span>Status</span>
            <strong>讀取失敗</strong>
            <small>${error.message || "請稍後再試"}</small>
          </article>`;
        }
      }

      document.getElementById("refreshDiagnosticsButton").addEventListener("click", loadDiagnostics);
      document.getElementById("runHealthCheckButton").addEventListener("click", runHealthCheck);
      document.getElementById("repairDataButton").addEventListener("click", repairDataHealth);
      document.getElementById("rebuildPortfolioButton").addEventListener("click", rebuildPortfolio);
      document.getElementById("recheckHoldingsButton").addEventListener("click", recheckHoldings);
      document.getElementById("createBackupButton").addEventListener("click", createBackup);
      loadDiagnostics();
      loadDataHealth();
      loadVersion();
    </script>
  </body>
</html>
