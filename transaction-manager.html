<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>交易紀錄管理</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff8f3;
        --surface: rgba(255, 253, 250, 0.9);
        --surface-soft: rgba(255, 238, 237, 0.62);
        --ink: #4d3730;
        --muted: #8d746c;
        --line: rgba(204, 154, 143, 0.2);
        --green: #8faa83;
        --coral: #f6b7b7;
        --gold: #ffd7a8;
        --lavender: #d9ccf7;
        --glass-border: rgba(226, 173, 162, 0.24);
        --shadow: 0 14px 34px rgba(158, 103, 88, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
        background:
          radial-gradient(circle at 58% 12%, rgba(255, 210, 210, 0.46), transparent 34%),
          radial-gradient(circle at 88% 4%, rgba(241, 222, 205, 0.6), transparent 24%),
          radial-gradient(circle at 22% 72%, rgba(232, 218, 235, 0.35), transparent 30%),
          linear-gradient(180deg, #fff8f3 0%, #fff2ee 46%, #f9eadf 100%);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      form,
      .card {
        background:
          linear-gradient(135deg, rgba(255, 253, 250, 0.96), rgba(255, 238, 237, 0.62)),
          var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card {
        padding: 22px;
        margin-bottom: 18px;
      }

      .hero-card {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      h1 {
        margin: 0 0 8px;
        color: var(--ink);
        font-size: clamp(30px, 5vw, 48px);
        line-height: 1;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: #b86866;
        font-weight: 900;
        text-decoration: none;
      }

      .page-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mode-banner {
        margin-bottom: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        background: rgba(255, 253, 250, 0.72);
        color: var(--muted);
        font-weight: 850;
      }

      .mode-banner strong {
        color: var(--ink);
      }

      .mode-banner.editing {
        border-color: rgba(216, 104, 104, 0.32);
        background: rgba(255, 231, 231, 0.86);
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        padding: 22px;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #d17f87;
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select,
      button {
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 12px 14px;
        color: var(--ink);
        background: rgba(255, 253, 250, 0.82);
        font: inherit;
      }

      input:focus,
      select:focus {
        outline: 2px solid rgba(209, 127, 135, 0.38);
        outline-offset: 2px;
      }

      button {
        cursor: pointer;
        font-weight: 900;
        background:
          linear-gradient(135deg, rgba(246, 183, 183, 0.92), rgba(255, 215, 168, 0.72)),
          rgba(255, 253, 250, 0.88);
        box-shadow: var(--shadow);
      }

      button.secondary {
        background: rgba(255, 253, 250, 0.82);
      }

      button.danger {
        color: #8c2f3f;
        background: linear-gradient(135deg, rgba(255, 213, 213, 0.96), rgba(246, 183, 183, 0.7));
      }

      button:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      .full {
        grid-column: 1 / -1;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        grid-column: 1 / -1;
        padding-top: 4px;
      }

      .status {
        color: var(--muted);
        font-weight: 850;
      }

      .status.success {
        color: #557b4c;
      }

      .status.error {
        color: #b84a5f;
      }

      .status.working {
        color: #b86866;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(180px, 1.5fr) repeat(4, minmax(110px, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .filters label {
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        color: var(--ink);
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #d17f87;
        font-size: 12px;
        font-weight: 900;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 253, 250, 0.64);
      }

      .row-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .row-actions button {
        padding: 8px 10px;
        border-radius: 10px;
      }

      .editing-row {
        background: rgba(255, 231, 231, 0.72);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 238, 237, 0.78);
        color: #8c514b;
        font-size: 12px;
        font-weight: 900;
      }

      @media (max-width: 720px) {
        form {
          grid-template-columns: 1fr;
        }

        .filters {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>交易紀錄管理</h1>
          <p>新增、編輯或刪除買進 / 賣出交易，並同步更新正式投資資料。</p>
        </div>
        <div class="page-actions">
          <a href="./index.html">← 回到首頁</a>
        </div>
      </section>

      <div class="mode-banner" id="modeBanner">
        <span><strong>新增模式</strong> 填寫下方欄位後儲存一筆新交易。</span>
      </div>

      <form id="transactionForm">
        <label>
          日期
          <input name="date" type="text" inputmode="numeric" placeholder="115/06/06" required />
        </label>
        <label>
          市場
          <select name="market" required>
            <option value="TW">TW</option>
            <option value="US">US</option>
          </select>
        </label>
        <label>
          股票代號
          <input name="symbol" placeholder="0050" required />
        </label>
        <label>
          股票名稱
          <input name="name" placeholder="元大台灣50" required />
        </label>
        <label>
          動作
          <select name="action" required>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
          </select>
        </label>
        <label>
          股數
          <input name="shares" type="number" step="0.000001" min="0" required />
        </label>
        <label>
          成交價格
          <input name="price" type="number" step="0.0001" min="0" required />
        </label>
        <label>
          手續費
          <input name="fee" type="number" step="0.01" min="0" value="0" />
        </label>
        <label class="full">
          備註
          <input name="note" placeholder="選填" />
        </label>
        <div class="actions">
          <span class="status" id="statusText">載入交易紀錄中...</span>
          <div class="row-actions">
            <button class="secondary" id="cancelEditButton" type="button" hidden>取消編輯</button>
            <button id="submitButton" type="submit">新增交易</button>
          </div>
        </div>
      </form>

      <section class="card">
        <div class="filters" id="transactionFilters">
          <label>
            搜尋
            <input id="searchFilter" type="search" placeholder="股票代號 / 名稱 / 備註" />
          </label>
          <label>
            市場
            <select id="marketFilter">
              <option value="">全部</option>
              <option value="TW">TW</option>
              <option value="US">US</option>
            </select>
          </label>
          <label>
            動作
            <select id="actionFilter">
              <option value="">全部</option>
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
          </label>
          <label>
            年份
            <select id="yearFilter">
              <option value="">全部</option>
            </select>
          </label>
          <label>
            月份
            <select id="monthFilter">
              <option value="">全部</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>市場</th>
                <th>股票</th>
                <th>動作</th>
                <th>股數</th>
                <th>成交價格</th>
                <th>手續費</th>
                <th>備註</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="transactionRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./transaction-manager.js?v=20260606-stock-name-autofill"></script>
  </body>
</html>
