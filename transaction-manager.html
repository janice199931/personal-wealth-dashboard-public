<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>交易紀錄管理</title>
    <link rel="stylesheet" href="./form-pages.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>交易紀錄管理</h1>
          <p>新增、編輯或刪除買進 / 賣出交易，並同步更新正式投資資料。</p>
        </div>
        <div class="page-actions">
          <a href="./index.html">← 回到首頁</a>
        </div>
      </section>

      <div class="mode-banner" id="modeBanner">
        <span><strong>新增模式</strong> 填寫下方欄位後儲存一筆新交易。</span>
      </div>

      <form id="transactionForm">
        <label class="date-field">
          日期
          <input name="date" type="text" readonly required />
        </label>
        <label>
          市場
          <select name="market" required>
            <option value="TW">TW</option>
            <option value="US">US</option>
          </select>
        </label>
        <label>
          股票代號
          <input name="symbol" list="symbolOptions" placeholder="0050" required />
          <datalist id="symbolOptions"></datalist>
        </label>
        <label>
          股票名稱
          <input name="name" placeholder="元大台灣50" required />
        </label>
        <label>
          動作
          <select name="action" required>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
          </select>
        </label>
        <label>
          股數
          <input name="shares" type="number" step="0.000001" min="0" required />
        </label>
        <label>
          成交價格
          <input name="price" type="number" step="0.0001" min="0" required />
        </label>
        <label>
          手續費
          <input name="fee" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          投入來源
          <select name="purpose">
            <option value="">未分類</option>
            <option value="dividend">股息再投入</option>
            <option value="extra">額外加碼</option>
            <option value="rebalance">再平衡調整</option>
          </select>
        </label>
        <label class="full">
          備註
          <input name="note" placeholder="選填" />
        </label>
        <div class="actions">
          <span class="status" id="statusText">載入交易紀錄中...</span>
          <div class="row-actions">
            <button class="secondary" id="cancelEditButton" type="button" hidden>取消編輯</button>
            <button id="submitButton" type="submit">新增交易</button>
          </div>
        </div>
      </form>

      <section class="card preview-card" id="transactionPreviewCard" hidden>
        <div class="section-heading">
          <div>
            <span>交易前預覽</span>
            <h2 id="previewTitle">輸入交易後會顯示結果</h2>
          </div>
          <small id="previewStatus">尚未預覽</small>
        </div>
        <div class="result-grid preview-grid" id="transactionPreviewGrid"></div>
      </section>

      <section class="card">
        <div class="quick-filters" id="quickFilters" aria-label="快速篩選交易">
          <button class="active" type="button" data-filter="all">全部</button>
          <button type="button" data-filter="tw">台股</button>
          <button type="button" data-filter="us">美股</button>
          <button type="button" data-filter="buy">買進</button>
          <button type="button" data-filter="sell">賣出</button>
          <button type="button" data-filter="month">本月</button>
        </div>
        <div class="filters" id="transactionFilters">
          <label>
            搜尋
            <input id="searchFilter" type="search" placeholder="股票代號 / 名稱 / 備註" />
          </label>
          <label>
            市場
            <select id="marketFilter">
              <option value="">全部</option>
              <option value="TW">TW</option>
              <option value="US">US</option>
            </select>
          </label>
          <label>
            動作
            <select id="actionFilter">
              <option value="">全部</option>
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
          </label>
          <label>
            年份
            <select id="yearFilter">
              <option value="">全部</option>
            </select>
          </label>
          <label>
            月份
            <select id="monthFilter">
              <option value="">全部</option>
            </select>
          </label>
        </div>
        <div class="table-wrap transaction-table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>市場</th>
                <th>股票</th>
                <th>動作</th>
                <th>股數</th>
                <th>成交價格</th>
                <th>手續費</th>
                <th>投入來源</th>
                <th>備註</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="transactionRows"></tbody>
          </table>
        </div>
        <div class="transaction-card-list" id="transactionCards"></div>
      </section>
    </main>
    <script src="./transaction-manager.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
