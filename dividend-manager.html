<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>股息追蹤</title>
    <link rel="stylesheet" href="./form-pages.css?v=20260622-symbol-list" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>股息追蹤</h1>
          <p>記錄台股與美股股息，並用目前匯率統計今年股息收入。</p>
        </div>
        <a href="./index.html">← 回到首頁</a>
      </section>

      <div class="mode-banner" id="modeBanner">
        <span><strong>新增模式</strong> 填寫下方欄位後儲存一筆新股息。</span>
      </div>

      <section class="card">
        <div class="summary-grid">
          <div class="summary-box">
            <span>今年已領股息</span>
            <strong id="yearDividendTotal">NT$0</strong>
          </div>
          <div class="summary-box">
            <span>平均每月股息</span>
            <strong id="averageMonthlyDividend">NT$0</strong>
          </div>
          <div class="summary-box">
            <span>預估年化股息</span>
            <strong id="projectedAnnualDividend">NT$0</strong>
            <br />
            <small id="fxRateText">依目前匯率換算</small>
          </div>
        </div>
      </section>

      <form id="dividendForm">
        <label class="date-field">
          日期
          <input name="date" type="text" readonly required />
        </label>
        <label>
          市場
          <select name="market" required>
            <option value="TW">TW</option>
            <option value="US">US</option>
          </select>
        </label>
        <label>
          股票代號
          <input name="symbol" list="symbolOptions" placeholder="0050" required />
          <datalist id="symbolOptions"></datalist>
        </label>
        <label>
          股票名稱
          <input name="name" placeholder="元大台灣50" required />
        </label>
        <label>
          股息金額
          <input name="amount" type="number" step="0.01" min="0" required />
        </label>
        <label>
          幣別
          <select name="currency" required>
            <option value="TWD">TWD</option>
            <option value="USD">USD</option>
          </select>
        </label>
        <div class="actions">
          <span class="status" id="statusText">載入股息紀錄中...</span>
          <div class="row-actions">
            <button class="secondary" id="cancelEditButton" type="button" hidden>取消編輯</button>
            <button id="submitButton" type="submit">新增股息</button>
          </div>
        </div>
      </form>

      <section class="card">
        <div class="filters dividend-filters">
          <label>
            年份
            <select id="yearFilter">
              <option value="">全部</option>
            </select>
          </label>
          <label>
            月份
            <select id="monthFilter">
              <option value="">全部</option>
            </select>
          </label>
          <label>
            股票
            <input id="stockFilter" type="search" placeholder="股票代號 / 名稱" />
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>市場</th>
                <th>股票</th>
                <th>股息</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="dividendRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const form = document.getElementById("dividendForm");
      const rows = document.getElementById("dividendRows");
      const statusText = document.getElementById("statusText");
      const submitButton = document.getElementById("submitButton");
      const cancelEditButton = document.getElementById("cancelEditButton");
      const modeBanner = document.getElementById("modeBanner");
      const filters = {
        year: document.getElementById("yearFilter"),
        month: document.getElementById("monthFilter"),
        stock: document.getElementById("stockFilter"),
      };
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
      const decimal = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 2 });
      let dividends = [];
      let editingId = null;
      let fxRate = 31.451;
      let lastAutoFilledName = "";
      const stockNameMap = new Map(Object.entries({
        "0050": "元大台灣50",
        GOOG: "Alphabet",
        MU: "Micron Technology",
        NVDA: "NVIDIA",
        TSM: "Taiwan Semiconductor",
        VOO: "Vanguard S&P 500 ETF",
      }));

      form.elements.date.value = "";

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function readApiPayload(response, fallbackMessage) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { detail: fallbackMessage };
        }
      }

      function friendlyApiError(payload, fallbackMessage) {
        return payload?.detail || fallbackMessage;
      }

      function dividendTime(item) {
        const time = new Date(`${item.date || ""}T00:00:00`).getTime();
        return Number.isNaN(time) ? 0 : time;
      }

      function rocYear(year) {
        return Number(year) - 1911;
      }

      function formatInputDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatInputRocDate(date) {
        const year = rocYear(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}/${month}/${day}`;
      }

      function formatDisplayDate(value) {
        const date = new Date(`${value || ""}T00:00:00`);
        if (Number.isNaN(date.getTime())) return String(value || "");
        return formatInputRocDate(date);
      }

      function parseRocInputDate(value) {
        const text = String(value || "").trim();
        const parts = text.replaceAll(".", "/").replaceAll("-", "/").split("/").map((part) => part.trim()).filter(Boolean);
        if (parts.length !== 3) return null;
        let [year, month, day] = parts.map((part) => Number(part));
        if (!year || !month || !day) return null;
        if (year < 1911) year += 1911;
        const date = new Date(year, month - 1, day);
        const valid = date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
        return valid ? date : null;
      }

      function sameDay(a, b) {
        return Boolean(a && b) && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }

      function datePickerYears(selectedYear) {
        const currentYear = new Date().getFullYear();
        const start = Math.min(currentYear - 10, selectedYear);
        const end = Math.max(currentYear + 5, selectedYear);
        return Array.from({ length: end - start + 1 }, (_, index) => start + index);
      }

      function setupDatePicker(input) {
        const field = input.closest(".date-field");
        const picker = document.createElement("div");
        let viewDate = new Date();
        picker.className = "date-picker";
        picker.hidden = true;
        field.appendChild(picker);

        function renderPicker() {
          const selected = parseRocInputDate(input.value);
          const today = new Date();
          const year = viewDate.getFullYear();
          const month = viewDate.getMonth();
          const yearOptions = datePickerYears(year)
            .map((optionYear) => `<option value="${optionYear}" ${optionYear === year ? "selected" : ""}>${rocYear(optionYear)} 年</option>`)
            .join("");
          const monthOptions = Array.from({ length: 12 }, (_, index) => {
            const optionMonth = index + 1;
            return `<option value="${index}" ${index === month ? "selected" : ""}>${optionMonth} 月</option>`;
          }).join("");
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const blanks = Array.from({ length: firstDay }, () => "<span></span>").join("");
          const days = Array.from({ length: daysInMonth }, (_, index) => {
            const day = index + 1;
            const date = new Date(year, month, day);
            const classes = [
              "date-picker-day",
              sameDay(date, today) ? "is-today" : "",
              sameDay(date, selected) ? "is-selected" : "",
            ].filter(Boolean).join(" ");
            return `<button class="${classes}" type="button" data-day="${day}">${day}</button>`;
          }).join("");
          picker.innerHTML = `
            <div class="date-picker-header">
              <button type="button" data-nav="-1">‹</button>
              <span class="date-picker-selects">
                <select data-date-year aria-label="選擇年份">${yearOptions}</select>
                <select data-date-month aria-label="選擇月份">${monthOptions}</select>
              </span>
              <button type="button" data-nav="1">›</button>
            </div>
            <div class="date-picker-grid">
              ${["日", "一", "二", "三", "四", "五", "六"].map((day) => `<span class="date-picker-weekday">${day}</span>`).join("")}
              ${blanks}${days}
            </div>`;
        }

        function openPicker() {
          if (!picker.hidden) return;
          const selected = parseRocInputDate(input.value);
          viewDate = selected || new Date();
          renderPicker();
          picker.hidden = false;
        }

        input.addEventListener("click", openPicker);
        input.addEventListener("focus", openPicker);
        picker.addEventListener("click", (event) => {
          event.stopPropagation();
          const nav = event.target.closest("button[data-nav]");
          if (nav) {
            event.preventDefault();
            viewDate.setMonth(viewDate.getMonth() + Number(nav.dataset.nav));
            renderPicker();
            return;
          }
          const dayButton = event.target.closest("button[data-day]");
          if (!dayButton) return;
          event.preventDefault();
          const date = new Date(viewDate.getFullYear(), viewDate.getMonth(), Number(dayButton.dataset.day));
          input.value = formatInputRocDate(date);
          picker.hidden = true;
        });
        picker.addEventListener("change", (event) => {
          event.stopPropagation();
          if (event.target.matches("[data-date-year]")) {
            viewDate.setFullYear(Number(event.target.value));
            renderPicker();
            return;
          }
          if (event.target.matches("[data-date-month]")) {
            viewDate.setMonth(Number(event.target.value));
            renderPicker();
          }
        });
        document.addEventListener("click", (event) => {
          if (field.contains(event.target)) return;
          picker.hidden = true;
        });
      }

      function normalizeSymbol(value) {
        return String(value || "").trim().toUpperCase();
      }

      function renderStockOptions() {
        const symbolOptions = document.getElementById("symbolOptions");
        if (!symbolOptions) return;
        const options = [...stockNameMap.entries()]
          .sort(([left], [right]) => left.localeCompare(right, "en"))
          .map(([symbol, name]) => `<option value="${escapeHtml(symbol)}" label="${escapeHtml(name)}"></option>`);
        symbolOptions.innerHTML = options.join("");
      }

      function rememberStockName(symbol, name) {
        const normalizedSymbol = normalizeSymbol(symbol);
        const normalizedName = String(name || "").trim();
        if (normalizedSymbol && normalizedName) stockNameMap.set(normalizedSymbol, normalizedName);
      }

      function learnStockNames(items) {
        (items || []).forEach((item) => rememberStockName(item.symbol, item.name));
        renderStockOptions();
      }

      async function loadTransactionStockNames() {
        try {
          const response = await fetch("/api/transactions", { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.json();
          learnStockNames(payload.transactions || []);
        } catch {
          // The built-in map still covers the common stocks.
        }
      }

      async function loadPortfolioStockNames() {
        try {
          const response = await fetch("/api/portfolio", { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.json();
          learnStockNames(payload.portfolio?.holdings || []);
        } catch {
          // Existing dividend and transaction names are enough if temporarily unavailable.
        }
      }

      function autoFillStockName() {
        const symbol = normalizeSymbol(form.elements.symbol.value);
        form.elements.symbol.value = symbol;
        const name = stockNameMap.get(symbol);
        if (!name) return;
        const currentName = String(form.elements.name.value || "").trim();
        if (currentName && currentName !== lastAutoFilledName) return;
        form.elements.name.value = name;
        lastAutoFilledName = name;
      }

      function syncCurrencyWithMarket() {
        form.elements.currency.value = form.elements.market.value === "US" ? "USD" : "TWD";
      }

      function normalizeInputDate(value) {
        const text = String(value || "").trim();
        const parts = text.replaceAll(".", "/").replaceAll("-", "/").split("/").map((part) => part.trim()).filter(Boolean);
        if (parts.length !== 3) throw new Error("日期格式請輸入民國年，例如 115/02/11");
        let [year, month, day] = parts.map((part) => Number(part));
        if (!year || !month || !day) throw new Error("日期格式請輸入民國年，例如 115/02/11");
        if (year < 1911) year += 1911;
        const date = new Date(year, month - 1, day);
        const valid = date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
        if (!valid) throw new Error("日期不是有效日期");
        return formatInputDate(date);
      }

      function dividendTwd(item) {
        const amount = Number(item.amount) || 0;
        return item.currency === "USD" ? amount * fxRate : amount;
      }

      function currentYear() {
        return new Date().getFullYear().toString();
      }

      function currentMonthNumber() {
        return Number(new Intl.DateTimeFormat("en-US", {
          timeZone: "Asia/Taipei",
          month: "numeric",
        }).format(new Date()));
      }

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      function setFormMode(id = null) {
        editingId = id;
        submitButton.textContent = editingId ? "更新股息" : "新增股息";
        cancelEditButton.hidden = !editingId;
        const dividend = dividends.find((item) => item.id === editingId);
        modeBanner.classList.toggle("editing", Boolean(editingId));
        modeBanner.innerHTML = editingId && dividend
          ? `<span><strong>編輯模式</strong> 正在修改 ${escapeHtml(formatDisplayDate(dividend.date))} ${escapeHtml(dividend.market)}:${escapeHtml(dividend.symbol)} 的股息，完成後請按「更新股息」。</span>`
          : `<span><strong>新增模式</strong> 填寫下方欄位後儲存一筆新股息。</span>`;
        renderDividends();
      }

      function resetForm() {
        form.reset();
        form.elements.date.value = "";
        syncCurrencyWithMarket();
        lastAutoFilledName = "";
        setFormMode(null);
      }

      function activeFilters() {
        return {
          year: filters.year.value,
          month: filters.month.value,
          stock: filters.stock.value.trim().toLowerCase(),
        };
      }

      function dividendMatches(item, filter) {
        const date = String(item.date || "");
        const stockText = [item.symbol, item.name].join(" ").toLowerCase();
        return (
          (!filter.year || date.slice(0, 4) === filter.year) &&
          (!filter.month || date.slice(5, 7) === filter.month) &&
          (!filter.stock || stockText.includes(filter.stock))
        );
      }

      function visibleDividends() {
        const filter = activeFilters();
        return dividends
          .filter((item) => dividendMatches(item, filter))
          .sort((a, b) => dividendTime(b) - dividendTime(a));
      }

      function populateFilters() {
        const selectedYear = filters.year.value;
        const selectedMonth = filters.month.value;
        const years = [...new Set(dividends.map((item) => String(item.date || "").slice(0, 4)).filter(Boolean))].sort((a, b) => b.localeCompare(a));
        const months = [...new Set(dividends.map((item) => String(item.date || "").slice(5, 7)).filter(Boolean))].sort();
        filters.year.innerHTML = `<option value="">全部</option>${years.map((year) => `<option value="${escapeHtml(year)}">${escapeHtml(rocYear(year))} 年</option>`).join("")}`;
        filters.month.innerHTML = `<option value="">全部</option>${months.map((month) => `<option value="${escapeHtml(month)}">${escapeHtml(month)}</option>`).join("")}`;
        filters.year.value = years.includes(selectedYear) ? selectedYear : "";
        filters.month.value = months.includes(selectedMonth) ? selectedMonth : "";
      }

      function renderSummary() {
        const year = currentYear();
        const thisYear = dividends.filter((item) => String(item.date || "").slice(0, 4) === year);
        const twTotal = thisYear.filter((item) => item.market === "TW").reduce((sum, item) => sum + dividendTwd(item), 0);
        const usTotal = thisYear.filter((item) => item.market === "US").reduce((sum, item) => sum + dividendTwd(item), 0);
        const total = twTotal + usTotal;
        const averageMonthly = total / Math.max(1, currentMonthNumber());
        document.getElementById("yearDividendTotal").textContent = money.format(Math.round(total));
        document.getElementById("averageMonthlyDividend").textContent = money.format(Math.round(averageMonthly));
        document.getElementById("projectedAnnualDividend").textContent = money.format(Math.round(averageMonthly * 12));
        document.getElementById("fxRateText").textContent = `台股 ${money.format(Math.round(twTotal))} / 美股 ${money.format(Math.round(usTotal))}，1 USD = ${fxRate} TWD`;
      }

      function renderDividends() {
        const items = visibleDividends();
        renderSummary();
        if (!items.length) {
          rows.innerHTML = `<tr><td colspan="5">尚無股息紀錄</td></tr>`;
          return;
        }
        rows.innerHTML = items
          .map((item) => `
            <tr class="${item.id === editingId ? "editing-row" : ""}">
              <td>${escapeHtml(formatDisplayDate(item.date))}</td>
              <td><span class="badge">${escapeHtml(item.market)}</span></td>
              <td>${escapeHtml(item.symbol)}<br />${escapeHtml(item.name)}</td>
              <td>${decimal.format(Number(item.amount) || 0)} ${escapeHtml(item.currency)}</td>
              <td>
                <div class="row-actions">
                  <button class="secondary" type="button" data-action="edit" data-id="${escapeHtml(item.id)}">編輯</button>
                  <button class="danger" type="button" data-action="delete" data-id="${escapeHtml(item.id)}">刪除</button>
                </div>
              </td>
            </tr>
          `)
          .join("");
      }

      function setDividends(nextDividends) {
        dividends = nextDividends || [];
        learnStockNames(dividends);
        populateFilters();
        renderDividends();
      }

      function currentDividend() {
        const formData = new FormData(form);
        const symbol = normalizeSymbol(formData.get("symbol"));
        const name = String(formData.get("name")).trim();
        rememberStockName(symbol, name);
        renderStockOptions();
        return {
          date: normalizeInputDate(formData.get("date")),
          market: formData.get("market"),
          symbol,
          name,
          amount: Number(formData.get("amount")),
          currency: formData.get("currency"),
          tax: 0,
          note: "",
        };
      }

      function editDividend(id) {
        const dividend = dividends.find((item) => item.id === id);
        if (!dividend) return;
        form.elements.date.value = formatDisplayDate(dividend.date);
        form.elements.market.value = dividend.market || "TW";
        form.elements.symbol.value = dividend.symbol || "";
        form.elements.name.value = dividend.name || "";
        lastAutoFilledName = "";
        form.elements.amount.value = dividend.amount ?? "";
        form.elements.currency.value = dividend.currency || "TWD";
        setFormMode(id);
        setStatus("正在編輯股息，確認欄位後按「更新股息」。", "working");
        form.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      async function loadFxRate() {
        try {
          const response = await fetch("/api/portfolio", { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.json();
          fxRate = Number(payload.portfolio?.fxRate) || fxRate;
        } catch {
          // Keep the last known default.
        }
      }

      async function loadDividends() {
        await loadFxRate();
        await Promise.all([loadPortfolioStockNames(), loadTransactionStockNames()]);
        const response = await fetch("/api/dividends", { cache: "no-store" });
        const payload = await readApiPayload(response, "股息紀錄讀取失敗，請重新整理或確認登入狀態。");
        if (!response.ok) throw new Error(friendlyApiError(payload, "股息紀錄讀取失敗，請重新整理或確認登入狀態。"));
        setDividends(payload.dividends || []);
        setStatus(`已載入 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`, "success");
      }

      async function saveDividend() {
        const url = editingId ? `/api/dividends/${encodeURIComponent(editingId)}` : "/api/dividends";
        const method = editingId ? "PUT" : "POST";
        const response = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(currentDividend()),
        });
        const payload = await readApiPayload(response, "股息儲存失敗，請稍後再試。");
        if (!response.ok) throw new Error(friendlyApiError(payload, "股息儲存失敗，請稍後再試。"));
        return payload;
      }

      async function deleteDividend(id) {
        const dividend = dividends.find((item) => item.id === id);
        if (!dividend) return;
        const label = `${formatDisplayDate(dividend.date)} ${dividend.market}:${dividend.symbol}`;
        if (!window.confirm(`確定刪除這筆股息？\n${label}`)) return;

        setStatus("刪除中...", "working");
        const response = await fetch(`/api/dividends/${encodeURIComponent(id)}`, { method: "DELETE" });
        const payload = await readApiPayload(response, "股息刪除失敗，請稍後再試。");
        if (!response.ok) throw new Error(friendlyApiError(payload, "股息刪除失敗，請稍後再試。"));
        setDividends(payload.dividends || []);
        if (editingId === id) resetForm();
        setStatus(`已刪除，現在共有 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`, "success");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus(editingId ? "更新中..." : "儲存中...", "working");
        try {
          const payload = await saveDividend();
          setDividends(payload.dividends || []);
          setStatus(
            editingId
              ? `已更新，現在共有 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`
              : `已新增，現在共有 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`,
            "success",
          );
          resetForm();
        } catch (error) {
          setStatus(error.message, "error");
        } finally {
          submitButton.disabled = false;
        }
      });

      cancelEditButton.addEventListener("click", () => {
        resetForm();
        setStatus(`已載入 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`, "success");
      });

      Object.values(filters).forEach((input) => {
        input.addEventListener("input", () => {
          renderDividends();
          setStatus(`已載入 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`, "success");
        });
        input.addEventListener("change", () => {
          renderDividends();
          setStatus(`已載入 ${dividends.length} 筆股息，顯示 ${visibleDividends().length} 筆`, "success");
        });
      });

      form.elements.symbol.addEventListener("input", autoFillStockName);
      form.elements.symbol.addEventListener("change", autoFillStockName);
      form.elements.symbol.addEventListener("blur", autoFillStockName);
      form.elements.market.addEventListener("change", autoFillStockName);
      form.elements.market.addEventListener("change", syncCurrencyWithMarket);
      form.elements.name.addEventListener("input", () => {
        if (form.elements.name.value.trim() !== lastAutoFilledName) lastAutoFilledName = "";
      });
      setupDatePicker(form.elements.date);
      syncCurrencyWithMarket();
      renderStockOptions();

      rows.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action][data-id]");
        if (!button) return;
        const { action, id } = button.dataset;
        if (action === "edit") {
          editDividend(id);
          return;
        }
        if (action === "delete") {
          button.disabled = true;
          try {
            await deleteDividend(id);
          } catch (error) {
            setStatus(error.message, "error");
          } finally {
            button.disabled = false;
          }
        }
      });

      loadDividends().catch((error) => {
        setStatus(error.message, "error");
        renderDividends();
      });
    </script>
  </body>
</html>
