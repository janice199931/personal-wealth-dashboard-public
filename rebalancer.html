<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>再平衡檢查</title>
    <link rel="stylesheet" href="./form-pages.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>再平衡檢查</h1>
          <p>自動帶入首頁台股、美股與全部現金，依 40% / 40% / 20% 檢查配置；現金內先保留緊急預備金 10 萬。</p>
        </div>
        <div class="page-actions">
          <a href="./index.html">← 回到首頁</a>
        </div>
      </section>

      <form id="rebalanceForm">
        <label>
          台股目前總金額（規劃標的 00685L）
          <input name="twStocks" type="number" step="1" min="0" placeholder="例如 400000" required />
        </label>
        <label>
          美股目前總金額（規劃標的 QQQM，台幣）
          <input name="usStocks" type="number" step="1" min="0" placeholder="例如 400000" required />
        </label>
        <label>
          全部現金（含緊急與投資預備金）
          <input name="cash" type="number" step="1" min="0" placeholder="例如 200000" required />
        </label>
        <label>
          已保留緊急預備金
          <input name="protectedCash" type="number" step="1" min="0" value="100000" readonly />
        </label>
        <label>
          台股目標比例
          <input name="twTarget" type="number" step="1" min="0" max="100" value="40" required />
        </label>
        <label>
          美股目標比例
          <input name="usTarget" type="number" step="1" min="0" max="100" value="40" required />
        </label>
        <label>
          現金目標比例
          <input name="cashTarget" type="number" step="1" min="0" max="100" value="20" required />
        </label>
        <label class="full">
          容許偏移
          <select name="band">
            <option value="3">超過 3% 才提示參考調整</option>
            <option value="5" selected>超過 5% 才提示參考調整</option>
            <option value="10">超過 10% 才提示參考調整</option>
          </select>
        </label>
        <div class="actions full">
          <span class="status" id="statusText">正在讀取首頁資料...</span>
          <div class="row-actions">
            <button class="secondary" id="reloadButton" type="button">重新帶入首頁資料</button>
            <button id="saveButton" type="button">記住這次金額</button>
          </div>
        </div>
      </form>

      <section class="card" id="resultCard">
        <div class="result-grid rebalance-result-grid" id="resultGrid"></div>
        <div class="rebalance-visual" aria-label="目前配置比例">
          <span id="twBar"></span>
          <span id="usBar"></span>
          <span id="cashBar"></span>
        </div>
        <div class="mode-banner rebalance-advice" id="adviceBox"></div>
        <div class="next-contribution-box" id="nextContributionBox"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById("rebalanceForm");
      const resultGrid = document.getElementById("resultGrid");
      const statusText = document.getElementById("statusText");
      const saveButton = document.getElementById("saveButton");
      const reloadButton = document.getElementById("reloadButton");
      const adviceBox = document.getElementById("adviceBox");
      const nextContributionBox = document.getElementById("nextContributionBox");
      const twBar = document.getElementById("twBar");
      const usBar = document.getElementById("usBar");
      const cashBar = document.getElementById("cashBar");
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
      const pct = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 1 });
      const STORAGE_KEY = "wealthDashboardRebalanceDraft";
      const EMERGENCY_FUND_TARGET = 100000;

      function numberValue(name) {
        return Number(form.elements[name].value) || 0;
      }

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      function resultBox(label, value) {
        return `<article class="result-box"><span>${label}</span><strong>${value}</strong></article>`;
      }

      function renderEmpty() {
        resultGrid.innerHTML = [
          resultBox("目前台股比例", "0%"),
          resultBox("目前美股比例", "0%"),
          resultBox("目前現金比例", "0%"),
          resultBox("建議調整金額", money.format(0)),
        ].join("");
        twBar.style.width = "40%";
        usBar.style.width = "40%";
        cashBar.style.width = "20%";
        adviceBox.innerHTML = "<span><strong>等待資料</strong> 帶入首頁資料後，這裡會顯示再平衡建議。</span>";
        nextContributionBox.innerHTML = "";
      }

      async function readApiPayload(response, fallbackMessage) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { detail: fallbackMessage };
        }
      }

      function accountBreakdown(accounts) {
        const breakdown = accounts?.accountBreakdown && typeof accounts.accountBreakdown === "object"
          ? accounts.accountBreakdown
          : {};
        const totalCash = Math.round(Number(accounts?.cashTWD ?? 0) || 0);
        const sinopac = Math.round(Number(breakdown.sinopacBalance ?? 0) || 0);
        const hasSinopacBalance = breakdown.sinopacBalance !== undefined
          && breakdown.sinopacBalance !== null
          && breakdown.sinopacBalance !== "";
        const cashBase = hasSinopacBalance ? sinopac : totalCash;
        const protectedCash = Math.min(EMERGENCY_FUND_TARGET, cashBase);
        return {
          totalCash,
          sinopac,
          protectedCash,
          allocationCash: cashBase,
        };
      }

      function applyPortfolio(portfolio, accounts = null) {
        const allocation = portfolio?.allocation || {};
        const summary = portfolio?.summary || {};
        const twValue = Math.round(Number(allocation.taiwanStocks ?? 0) || 0);
        const usValue = Math.round(Number(allocation.usStocks ?? 0) || 0);
        const cashInfo = accounts
          ? accountBreakdown(accounts)
          : {
              totalCash: Math.round(Number(allocation.cash ?? summary.cash ?? 0) || 0),
              protectedCash: Math.min(Math.round(Number(allocation.cash ?? summary.cash ?? 0) || 0), EMERGENCY_FUND_TARGET),
              allocationCash: Math.max(0, Math.round(Number(allocation.cash ?? summary.cash ?? 0) || 0)),
            };
        form.elements.twStocks.value = twValue;
        form.elements.usStocks.value = usValue;
        form.elements.cash.value = cashInfo.allocationCash;
        form.elements.protectedCash.value = cashInfo.protectedCash;
        calculate();
        setStatus(
          twValue || usValue
            ? "已帶入首頁台股、美股與全部現金；緊急預備金已包含在現金 20% 內。"
            : "首頁目前找不到投資持倉，已帶入現金，持倉金額可手動輸入。",
          twValue || usValue ? "success" : "working",
        );
      }

      async function loadPortfolioData() {
        reloadButton.disabled = true;
        setStatus("正在讀取首頁資料...", "working");
        try {
          const response = await fetch("/api/dashboard-core?fast=1", { cache: "no-store" });
          const payload = await readApiPayload(response, "首頁資料讀取失敗，請重新整理或確認登入狀態。");
          if (!response.ok) throw new Error(payload.detail || "首頁資料讀取失敗，請重新整理或確認登入狀態。");
          if (!payload.portfolio) throw new Error("目前沒有可帶入的首頁資料。");
          applyPortfolio(payload.portfolio, payload.accounts || null);
        } catch (error) {
          setStatus(error.message || "首頁資料讀取失敗，可先手動輸入。", "error");
          loadDraft();
          calculate();
        } finally {
          reloadButton.disabled = false;
        }
      }

      function calculate() {
        const twStocks = numberValue("twStocks");
        const usStocks = numberValue("usStocks");
        const cash = numberValue("cash");
        const protectedCash = numberValue("protectedCash");
        const twTarget = numberValue("twTarget");
        const usTarget = numberValue("usTarget");
        const cashTarget = numberValue("cashTarget");
        const band = numberValue("band");
        const targetTotal = twTarget + usTarget + cashTarget;

        if (targetTotal !== 100) {
          setStatus("目標比例合計需等於 100%。", "error");
          renderEmpty();
          return;
        }

        const total = twStocks + usStocks + cash;
        if (!total) {
          setStatus("輸入金額後會自動計算。");
          renderEmpty();
          return;
        }

        const twRatio = (twStocks / total) * 100;
        const usRatio = (usStocks / total) * 100;
        const cashRatio = (cash / total) * 100;
        const targets = [
          { name: "台股 00685L", current: twStocks, ratio: twRatio, target: twTarget },
          { name: "美股 QQQM", current: usStocks, ratio: usRatio, target: usTarget },
          { name: "現金", current: cash, ratio: cashRatio, target: cashTarget },
        ].map((item) => ({ ...item, targetAmount: total * item.target / 100, drift: item.ratio - item.target }));
        const largestDrift = targets.reduce((largest, item) => Math.abs(item.drift) > Math.abs(largest.drift) ? item : largest, targets[0]);
        const mostUnderweight = targets.reduce((lowest, item) => item.drift < lowest.drift ? item : lowest, targets[0]);
        const needsRebalance = targets.some((item) => Math.abs(item.drift) > band);
        const nextContribution = needsRebalance
          ? `目前 ${mostUnderweight.name} 最低於目標，下一筆投入可優先補足。`
          : "目前比例接近目標，下一筆新增資金可依台股 40% / 美股 40% / 現金 20% 分配。";
        const advice = needsRebalance
          ? `${largestDrift.name} 偏移 ${pct.format(Math.abs(largestDrift.drift))}%，可先用新資金調整，不必立即賣出持倉。`
          : `三類資產的偏移都在 ${band}% 容許範圍內，可先維持。`;

        resultGrid.innerHTML = [
          resultBox("目前台股比例", `${pct.format(twRatio)}%`),
          resultBox("目前美股比例", `${pct.format(usRatio)}%`),
          resultBox("目前現金比例", `${pct.format(cashRatio)}%`),
          ...targets.map((item) => resultBox(`${item.name}目標金額`, money.format(Math.round(item.targetAmount)))),
          resultBox("已保留緊急預備金", money.format(protectedCash)),
          resultBox("總檢查金額", money.format(total)),
        ].join("");
        twBar.style.width = `${Math.min(100, Math.max(0, twRatio))}%`;
        usBar.style.width = `${Math.min(100, Math.max(0, usRatio))}%`;
        cashBar.style.width = `${Math.min(100, Math.max(0, cashRatio))}%`;
        adviceBox.classList.toggle("editing", needsRebalance);
        adviceBox.innerHTML = `<span><strong>${needsRebalance ? "參考調整" : "目前可維持"}</strong> ${advice}</span>`;
        nextContributionBox.innerHTML = `
          <span>下一筆投入建議</span>
          <strong>${nextContribution}</strong>
        `;
        setStatus("這是檢查與決策建議，不會自動交易。", "success");
      }

      function saveDraft() {
        const payload = {
          twStocks: form.elements.twStocks.value,
          usStocks: form.elements.usStocks.value,
          cash: form.elements.cash.value,
          twTarget: form.elements.twTarget.value,
          usTarget: form.elements.usTarget.value,
          cashTarget: form.elements.cashTarget.value,
          band: form.elements.band.value,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        setStatus("已記住這次金額，下次打開會自動帶入。", "success");
      }

      function loadDraft() {
        try {
          const payload = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          Object.entries(payload).forEach(([key, value]) => {
            if (form.elements[key]) form.elements[key].value = value;
          });
        } catch {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      form.addEventListener("input", calculate);
      form.addEventListener("change", calculate);
      saveButton.addEventListener("click", saveDraft);
      reloadButton.addEventListener("click", loadPortfolioData);
      calculate();
      loadPortfolioData();
    </script>
  </body>
</html>
