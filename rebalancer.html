<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>再平衡檢查</title>
    <link rel="stylesheet" href="./form-pages.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>再平衡檢查</h1>
          <p>全資產一體化指揮中心：自動依 55% / 25% / 20% 戰略目標進行動態再平衡檢查。</p>
        </div>
        <div class="page-actions">
          <a href="./index.html">← 回到首頁</a>
        </div>
      </section>

      <form id="rebalanceForm" class="rebalance-form">
        <div class="form-section full">
          <div class="form-section-heading">
            <div><span>資產大池</span><h2>目前全資產</h2></div>
            <small>由首頁自動帶入，也可手動微調</small>
          </div>
          <div class="rebalance-input-grid">
            <label>
              全部台股市值
              <input name="taiwanStockValue" type="number" step="1" min="0" placeholder="例如 550000" required />
            </label>
            <label>
              全部美股市值（台幣）
              <input name="usStockValue" type="number" step="1" min="0" placeholder="例如 250000" required />
            </label>
            <label>
              全部現金總額
              <input name="totalCash" type="number" step="1" min="0" placeholder="例如 200000" required />
            </label>
          </div>
        </div>
        <div class="form-section full">
          <div class="form-section-heading">
            <div><span>戰略設定</span><h2>目標與容許偏移</h2></div>
          </div>
          <div class="rebalance-target-grid">
        <label>
          台股目標比例
          <input name="twTarget" type="number" step="1" min="0" max="100" value="55" required />
        </label>
        <label>
          美股目標比例
          <input name="usTarget" type="number" step="1" min="0" max="100" value="25" required />
        </label>
        <label>
          現金目標比例
          <input name="cashTarget" type="number" step="1" min="0" max="100" value="20" required />
        </label>
        <label>
          容許偏移
          <select name="band">
            <option value="3">超過 3% 才提示參考調整</option>
            <option value="5" selected>超過 5% 才提示參考調整</option>
            <option value="10">超過 10% 才提示參考調整</option>
          </select>
        </label>
          </div>
        </div>
        <div class="actions full">
          <span class="status" id="statusText">正在讀取首頁資料...</span>
          <div class="row-actions">
            <button class="secondary" id="reloadButton" type="button">重新帶入首頁資料</button>
            <button id="saveButton" type="button">記住這次金額</button>
          </div>
        </div>
      </form>

      <section class="card" id="resultCard">
        <div class="rebalance-total">
          <span>全資產總市值</span>
          <strong id="totalAssetValue">$0</strong>
          <small>全部台股市值 + 全部美股市值 + 全部現金</small>
        </div>
        <div class="result-grid rebalance-result-grid" id="resultGrid"></div>
        <div class="rebalance-visual" aria-label="目前配置比例">
          <span id="twBar"></span>
          <span id="usBar"></span>
          <span id="cashBar"></span>
        </div>
        <div class="mode-banner rebalance-advice" id="adviceBox"></div>
        <div class="next-contribution-box" id="nextContributionBox"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById("rebalanceForm");
      const resultGrid = document.getElementById("resultGrid");
      const statusText = document.getElementById("statusText");
      const saveButton = document.getElementById("saveButton");
      const reloadButton = document.getElementById("reloadButton");
      const adviceBox = document.getElementById("adviceBox");
      const nextContributionBox = document.getElementById("nextContributionBox");
      const twBar = document.getElementById("twBar");
      const usBar = document.getElementById("usBar");
      const cashBar = document.getElementById("cashBar");
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
      const pct = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 1 });
      const STORAGE_KEY = "wealthDashboardRebalanceDraftV4Allocation552520";

      function numberValue(name) {
        return Number(form.elements[name].value) || 0;
      }

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      const totalAssetValue = document.getElementById("totalAssetValue");

      function assetColumn(item) {
        const difference = item.targetAmount - item.current;
        const isUnder = difference > 0;
        const status = Math.abs(difference) < 0.5
          ? `<div class="allocation-status balanced"><strong>【達標】</strong><span>目前金額符合目標</span></div>`
          : `<div class="allocation-status ${isUnder ? "under" : "over"}">
              <strong>【${isUnder ? "補貼" : "溢出"} ${pct.format(Math.abs(item.drift))}%】</strong>
              <span>${isUnder ? "需再投入" : "可釋出"} ${money.format(Math.round(Math.abs(difference)))}</span>
            </div>`;
        return `<article class="allocation-column ${item.key}">
          <header><span>${item.name}</span><small>目標 ${pct.format(item.target)}%</small></header>
          <div class="allocation-current"><span>目前比例</span><strong>${pct.format(item.ratio)}%</strong><small>${money.format(Math.round(item.current))}</small></div>
          <div class="allocation-target"><span>目標金額</span><strong>${money.format(Math.round(item.targetAmount))}</strong></div>
          ${status}
        </article>`;
      }

      function renderEmpty() {
        totalAssetValue.textContent = money.format(0);
        resultGrid.innerHTML = [
          { key: "tw", name: "台股", current: 0, ratio: 0, target: 55, targetAmount: 0, drift: -55 },
          { key: "us", name: "美股", current: 0, ratio: 0, target: 25, targetAmount: 0, drift: -25 },
          { key: "cash", name: "現金", current: 0, ratio: 0, target: 20, targetAmount: 0, drift: -20 },
        ].map(assetColumn).join("");
        twBar.style.width = "55%";
        usBar.style.width = "25%";
        cashBar.style.width = "20%";
        adviceBox.innerHTML = "<span><strong>等待資料</strong> 帶入首頁資料後，這裡會顯示再平衡建議。</span>";
        nextContributionBox.innerHTML = "";
      }

      async function readApiPayload(response, fallbackMessage) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { detail: fallbackMessage };
        }
      }

      function applyPortfolio(portfolio) {
        const allocation = portfolio?.allocation || {};
        const summary = portfolio?.summary || {};
        const twValue = Math.round(Number(allocation.taiwanStocks ?? portfolio?.markets?.TW?.marketValue ?? 0) || 0);
        const usValue = Math.round(Number(allocation.usStocks ?? portfolio?.markets?.US?.marketValue ?? 0) || 0);
        const cashValue = Math.max(0, Math.round(Number(allocation.cash ?? summary.cash ?? 0) || 0));
        form.elements.taiwanStockValue.value = twValue;
        form.elements.usStockValue.value = usValue;
        form.elements.totalCash.value = cashValue;
        calculate();
        setStatus(
          twValue || usValue
            ? "已帶入首頁的全部台股、全部美股與全部現金。"
            : "首頁目前找不到投資持倉，已帶入現金，持倉金額可手動輸入。",
          twValue || usValue ? "success" : "working",
        );
      }

      async function loadPortfolioData() {
        reloadButton.disabled = true;
        setStatus("正在讀取首頁資料...", "working");
        try {
          const response = await fetch("/api/dashboard-core?fast=1", { cache: "no-store" });
          const payload = await readApiPayload(response, "首頁資料讀取失敗，請重新整理或確認登入狀態。");
          if (!response.ok) throw new Error(payload.detail || "首頁資料讀取失敗，請重新整理或確認登入狀態。");
          if (!payload.portfolio) throw new Error("目前沒有可帶入的首頁資料。");
          applyPortfolio(payload.portfolio);
        } catch (error) {
          setStatus(error.message || "首頁資料讀取失敗，可先手動輸入。", "error");
          loadDraft();
          calculate();
        } finally {
          reloadButton.disabled = false;
        }
      }

      function calculate() {
        const twStocks = numberValue("taiwanStockValue");
        const usStocks = numberValue("usStockValue");
        const cash = numberValue("totalCash");
        const twTarget = numberValue("twTarget");
        const usTarget = numberValue("usTarget");
        const cashTarget = numberValue("cashTarget");
        const band = numberValue("band");
        const targetTotal = twTarget + usTarget + cashTarget;

        if (targetTotal !== 100) {
          setStatus("目標比例合計需等於 100%。", "error");
          renderEmpty();
          return;
        }

        const total = twStocks + usStocks + cash;
        if (!total) {
          setStatus("輸入金額後會自動計算。");
          renderEmpty();
          return;
        }

        const twRatio = (twStocks / total) * 100;
        const usRatio = (usStocks / total) * 100;
        const cashRatio = (cash / total) * 100;
        const targets = [
          { key: "tw", name: "台股", current: twStocks, ratio: twRatio, target: twTarget },
          { key: "us", name: "美股", current: usStocks, ratio: usRatio, target: usTarget },
          { key: "cash", name: "現金", current: cash, ratio: cashRatio, target: cashTarget },
        ].map((item) => ({ ...item, targetAmount: total * item.target / 100, drift: item.ratio - item.target }));
        const largestDrift = targets.reduce((largest, item) => Math.abs(item.drift) > Math.abs(largest.drift) ? item : largest, targets[0]);
        const mostUnderweight = targets.reduce((lowest, item) => item.drift < lowest.drift ? item : lowest, targets[0]);
        const needsRebalance = targets.some((item) => Math.abs(item.drift) > band);
        const baseContribution = `基礎分配：台股 ${pct.format(twTarget)}% / 美股 ${pct.format(usTarget)}% / 現金 ${pct.format(cashTarget)}%。`;
        const dynamicContribution = needsRebalance
          ? `動態調整：${mostUnderweight.name}低於目標 ${pct.format(Math.abs(mostUnderweight.drift))}%，下一筆資金優先投入 ${mostUnderweight.name}；高於目標的部位暫緩加碼。`
          : `目前三類資產偏差皆未超過 ${pct.format(band)}%，下一筆資金可維持基礎分配。`;
        const advice = needsRebalance
          ? `${largestDrift.name} 偏移 ${pct.format(Math.abs(largestDrift.drift))}%，可先用新資金調整，不必立即賣出持倉。`
          : `三類資產的偏移都在 ${band}% 容許範圍內，可先維持。`;

        totalAssetValue.textContent = money.format(Math.round(total));
        resultGrid.innerHTML = targets.map(assetColumn).join("");
        twBar.style.width = `${Math.min(100, Math.max(0, twRatio))}%`;
        usBar.style.width = `${Math.min(100, Math.max(0, usRatio))}%`;
        cashBar.style.width = `${Math.min(100, Math.max(0, cashRatio))}%`;
        adviceBox.classList.toggle("editing", needsRebalance);
        adviceBox.innerHTML = `<span><strong>${needsRebalance ? "參考調整" : "目前可維持"}</strong> ${advice}</span>`;
        nextContributionBox.innerHTML = `
          <span>下一筆投入建議</span>
          <strong>${baseContribution}</strong>
          <p class="${needsRebalance ? "dynamic-alert" : "within-band"}">${dynamicContribution}</p>
        `;
        setStatus("這是檢查與決策建議，不會自動交易。", "success");
      }

      function saveDraft() {
        const payload = {
          taiwanStockValue: form.elements.taiwanStockValue.value,
          usStockValue: form.elements.usStockValue.value,
          totalCash: form.elements.totalCash.value,
          twTarget: form.elements.twTarget.value,
          usTarget: form.elements.usTarget.value,
          cashTarget: form.elements.cashTarget.value,
          band: form.elements.band.value,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        setStatus("已記住這次金額，下次打開會自動帶入。", "success");
      }

      function loadDraft() {
        try {
          const payload = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          Object.entries(payload).forEach(([key, value]) => {
            if (form.elements[key]) form.elements[key].value = value;
          });
        } catch {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      form.addEventListener("input", calculate);
      form.addEventListener("change", calculate);
      saveButton.addEventListener("click", saveDraft);
      reloadButton.addEventListener("click", loadPortfolioData);
      calculate();
      loadPortfolioData();
    </script>
  </body>
</html>
