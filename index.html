<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Janice的小天地</title>
    <link rel="stylesheet" href="./styles.css?v=20260603-public-ui" />
  </head>
  <body>
    <aside class="sidebar" aria-label="主選單">
      <div class="sidebar-brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
          <rect width="48" height="48" rx="16"></rect>
          <circle cx="17" cy="19" r="4.2"></circle>
          <circle cx="24" cy="15" r="4.2"></circle>
          <circle cx="31" cy="19" r="4.2"></circle>
          <path d="M15.5 31.2c0-5 3.7-9 8.5-9s8.5 4 8.5 9c0 3.2-2.3 5-5 4.2-1.6-.5-3.4-.5-5 0-2.7.8-5-.6-5-4.2Z"></path>
        </svg>
        <strong>Wealth<br />Dashboard</strong>
      </div>
      <nav class="sidebar-nav">
        <a class="active" href="#kpiGrid">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.2 12 4l8 7.2"></path><path d="M6.5 10.5V20h5v-5h3v5h5v-9.5"></path></svg>
          總覽
        </a>
        <a href="#twInvestment">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9"></path><path d="M12 19V5"></path><path d="M19 19v-7"></path><path d="M4 19h16"></path></svg>
          台股投資
        </a>
        <a href="#usInvestment">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"></circle><path d="M4.5 12h15"></path><path d="M12 3.5c2.1 2.2 3.1 5 3.1 8.5s-1 6.3-3.1 8.5"></path><path d="M12 3.5c-2.1 2.2-3.1 5-3.1 8.5s1 6.3 3.1 8.5"></path></svg>
          美股投資
        </a>
        <a href="./transaction-manager.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4.5h8l3 3V20H7z"></path><path d="M15 4.5V8h3"></path><path d="M9.5 12h5"></path><path d="M9.5 16h4"></path></svg>
          交易紀錄
        </a>
        <a href="./dividend-manager.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v16"></path><path d="M8.2 8.2c0-1.7 1.5-3 3.8-3 2 0 3.3.9 3.8 2.2"></path><path d="M15.8 15.8c0 1.7-1.5 3-3.8 3-2 0-3.3-.9-3.8-2.2"></path><path d="M8.5 11.5h7c1.9 0 3.2 1 3.2 2.7s-1.4 2.6-3.4 2.6h-7"></path><path d="M15.5 11.5h-7c-1.9 0-3.2-1-3.2-2.7s1.4-2.6 3.4-2.6h7"></path></svg>
          股息追蹤
        </a>
        <a href="#milestones">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19c4.5-1.2 8.5-5.2 10-10"></path><path d="M15 9h4V5"></path><path d="M5 19h14"></path><circle cx="6" cy="18" r="1.5"></circle></svg>
          財富里程碑
        </a>
        <a href="#yearAccordion">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5.5h7.5A2.5 2.5 0 0 1 16 8v12H8.5A2.5 2.5 0 0 0 6 22z"></path><path d="M16 8a2.5 2.5 0 0 1 2.5-2.5H20V19h-4"></path><path d="M8.5 10h4"></path><path d="M8.5 14h3"></path></svg>
          年度報告
        </a>
        <a href="./settings.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1L14.5 3h-5l-.3 3.1a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7.6 7.6 0 0 0 1.7 1l.3 3.1h5l.3-3.1a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z"></path></svg>
          設定
        </a>
      </nav>
      <div class="sidebar-sync">
        <span></span>
        <p>資料更新時間<br /><strong id="sidebarUpdatedAt">尚未更新</strong></p>
      </div>
    </aside>

    <header class="topbar">
      <div class="topbar-actions" aria-label="主要操作">
        <button class="action-button" id="updatePricesButton" type="button">更新股價</button>
        <a class="action-button" href="./snapshot-manager.html">更新資產快照</a>
        <button class="action-button" id="exportBackupButton" type="button">匯出備份</button>
        <button class="action-button" id="importBackupButton" type="button">匯入備份</button>
        <button class="action-button" id="rebuildPortfolioButton" type="button">重建投資組合</button>
        <button class="action-button" id="migrateSupabaseButton" type="button">遷移 Supabase</button>
        <input id="backupFileInput" type="file" accept="application/json,.json" hidden />
        <span id="backupStatus" class="backup-status" aria-live="polite"></span>
      </div>
      <div id="dataUpdates" class="as-of update-strip"></div>
    </header>

    <main>
      <section class="hero-dashboard" aria-label="個人財富駕駛艙">
        <article class="hero-card">
          <div>
            <p class="eyebrow">Personal Wealth Dashboard</p>
            <h1>Janice的小天地</h1>
          </div>
          <div id="heroOverview" class="hero-overview"></div>
          <div id="heroMilestone" class="hero-milestone"></div>
          <div class="hero-cat" aria-hidden="true">
            <svg class="hero-cat-illustration" viewBox="0 0 220 132" role="img" aria-label="趴著的小貓插畫">
              <ellipse class="cat-shadow" cx="126" cy="113" rx="82" ry="12"></ellipse>
              <path class="cat-tail-shape" d="M181 83c21-8 25-33 11-42-9-6-20 0-18 11 1 7 9 9 14 5"></path>
              <path class="cat-body" d="M74 67c11-24 44-35 79-25 31 9 52 35 47 58-3 15-20 21-46 19H83c-27 0-42-6-42-18 0-12 12-23 33-34Z"></path>
              <path class="cat-head" d="M58 32c8-18 33-25 55-13 21 11 31 34 22 53-9 20-34 26-56 16-23-10-38-33-21-56Z"></path>
              <path class="cat-ear" d="M67 28 74 7l14 19"></path>
              <path class="cat-ear" d="M112 23 131 8l-2 25"></path>
              <path class="cat-ear-inner" d="M74 25 77 15l7 10"></path>
              <path class="cat-ear-inner" d="M116 24 125 16l-1 13"></path>
              <path class="cat-stripe" d="M88 19c2 7 1 12-4 17"></path>
              <path class="cat-stripe" d="M100 20c0 7-2 12-7 16"></path>
              <path class="cat-stripe body-stripe" d="M139 45c-3 8-2 15 4 21"></path>
              <path class="cat-stripe body-stripe" d="M160 54c-5 7-5 14 1 21"></path>
              <circle class="cat-eye" cx="77" cy="53" r="4"></circle>
              <circle class="cat-eye" cx="112" cy="53" r="4"></circle>
              <path class="cat-nose" d="M94 61c3-3 7-3 10 0-1 4-8 4-10 0Z"></path>
              <path class="cat-mouth" d="M99 65c-2 5-7 6-11 2"></path>
              <path class="cat-mouth" d="M101 65c2 5 7 6 11 2"></path>
              <path class="cat-whisker" d="M69 62H45"></path>
              <path class="cat-whisker" d="M70 69 47 75"></path>
              <path class="cat-whisker" d="M119 62h24"></path>
              <path class="cat-whisker" d="M118 69l23 6"></path>
              <path class="cat-paw" d="M80 96c5 10 19 10 24 0"></path>
              <path class="cat-paw" d="M132 100c7 8 20 8 26-1"></path>
              <circle class="cat-blush" cx="65" cy="62" r="6"></circle>
              <circle class="cat-blush" cx="122" cy="62" r="6"></circle>
            </svg>
          </div>
        </article>
      </section>

      <section class="kpi-grid" id="kpiGrid" aria-label="核心資產指標"></section>

      <section class="data-status-grid" id="dataStatusCards" aria-label="資料狀態"></section>

      <section class="dashboard dashboard-primary" aria-label="資產配置與成長">
        <article class="panel allocation-panel">
          <div class="panel-title">
            <div>
              <p class="eyebrow">Allocation</p>
              <h2>資產配置</h2>
            </div>
          </div>
          <div class="asset-pie-wrap">
            <canvas id="assetPieChart" height="250"></canvas>
            <div id="assetPieLegend" class="asset-pie-legend"></div>
          </div>
        </article>

        <article class="panel growth-panel">
          <div class="panel-title">
            <div>
              <p class="eyebrow">Net Worth</p>
              <h2>淨資產成長</h2>
            </div>
          </div>
          <div class="chart-frame">
            <canvas id="netWorthChart" height="280"></canvas>
            <div id="chartTooltip" class="chart-tooltip"></div>
          </div>
        </article>

        <article class="panel milestone-panel">
          <div class="panel-title">
            <div>
              <p class="eyebrow">Milestones</p>
              <h2>財富里程碑</h2>
            </div>
            <span class="panel-cat-mark" aria-hidden="true"></span>
          </div>
          <div id="milestones" class="milestone-list"></div>
        </article>
      </section>

      <section class="investment-grid" aria-label="投資明細">
        <article class="investment-card">
          <div class="panel-title">
            <div>
              <p class="eyebrow">Taiwan Stocks</p>
              <h2>台股投資</h2>
            </div>
          </div>
          <div id="twInvestment"></div>
        </article>

        <article class="investment-card">
          <div class="panel-title">
            <div>
              <p class="eyebrow">US Stocks</p>
              <h2>美股投資</h2>
            </div>
          </div>
          <div id="usInvestment"></div>
        </article>
      </section>

      <section class="dashboard ledger-section">
        <article class="panel full ledger-panel">
          <div class="panel-title">
            <div>
              <p class="eyebrow">Reconciliation</p>
              <h2>年度/月度對帳</h2>
            </div>
          </div>
          <div id="yearAccordion" class="year-accordion"></div>
        </article>
      </section>

      <p class="dashboard-footer">用心記錄每一筆財富，讓夢想一點一滴實現 ♡</p>
    </main>

    <script src="./app.js?v=20260604-hard-timeouts"></script>
  </body>
</html>
