<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>更新資產</title>
    <link rel="stylesheet" href="./form-pages.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>更新資產</h1>
          <p>填寫各帳戶的最新餘額，系統會依投資規則重新計算現金水位與今日建議。</p>
        </div>
        <a href="./index.html">← 回到首頁</a>
      </section>

      <form id="snapshotForm">
        <section class="form-section full">
          <div class="form-section-heading">
            <div><span>Snapshot Date</span><h2>資料日期</h2></div>
            <strong id="snapshotDate">讀取中…</strong>
          </div>
        </section>

        <section class="form-section full">
          <div class="form-section-heading"><div><span>Cash Assets</span><h2>現金資產</h2></div></div>
          <div class="form-field-grid">
            <label>
              永豐帳戶
              <input name="sinopacBalance" type="number" step="1" min="0" placeholder="未異動可留空" />
            </label>
            <label>
              Firstrade 現金（USD）
              <input name="cashUSD" type="number" step="0.01" min="0" placeholder="例如 1250.50" />
            </label>
          </div>
        </section>

        <section class="form-section full calculated-section">
          <div class="form-section-heading"><div><span>Calculated</span><h2>自動計算</h2></div></div>
          <div class="calculation-grid" aria-live="polite">
            <article><span>全部現金</span><strong id="calculatedTotalCash">—</strong></article>
            <article><span>緊急預備金</span><strong id="calculatedEmergencyFund">—</strong><small>目標 $100,000</small></article>
            <article><span>投資預備金</span><strong id="calculatedInvestmentReserve">—</strong></article>
            <article><span>現金占總金融資產</span><strong id="calculatedCashRatio">—</strong><small>目標 15%</small></article>
          </div>
        </section>

        <section class="form-section full">
          <div class="form-section-heading">
            <div><span>Optional</span><h2>本月現金流（選填）</h2></div>
            <div class="month-selectors"><select id="financeYear" aria-label="統計年份"></select><select id="financeMonth" aria-label="統計月份"></select></div>
          </div>
          <div class="form-field-grid">
            <label>
              本月收入
              <input name="monthlyIncome" type="number" step="1" min="0" placeholder="例如 60000" />
            </label>
            <label>
              本月支出
              <input name="monthlyExpense" type="number" step="1" min="0" placeholder="例如 25000" />
            </label>
          </div>
        </section>
        <div class="actions full">
          <span class="status" id="statusText">可只填有異動的欄位；空白欄位會維持原資料，不會歸零。</span>
          <button id="submitButton" type="submit">儲存並重新計算今日建議</button>
        </div>
      </form>

      <section class="card" id="resultCard" hidden>
        <div class="result-grid" id="resultGrid"></div>
      </section>
    </main>
    <script>
      const form = document.getElementById("snapshotForm");
      const statusText = document.getElementById("statusText");
      const submitButton = document.getElementById("submitButton");
      const resultCard = document.getElementById("resultCard");
      const resultGrid = document.getElementById("resultGrid");
      const financeYear = document.getElementById("financeYear");
      const financeMonth = document.getElementById("financeMonth");
      const EMERGENCY_FUND_TARGET = 100000;
      let currentAccounts = {};
      let stockAssetsTWD = 0;
      let currentFxRate = 0;
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
      const usdMoney = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 });

      function rocYear(year) {
        return Number(year) - 1911;
      }

      function currentTaiwanDate() {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
        }).format(new Date()).split("-");
        return { year: Number(parts[0]), month: parts[1] };
      }

      function currentTaiwanDateLabel() {
        return new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      }

      function fieldValue(name, fallback = 0) {
        const input = form.elements.namedItem(name);
        return input && input.value !== "" ? Number(input.value) || 0 : Number(fallback) || 0;
      }

      function renderCalculations() {
        const breakdown = currentAccounts.accountBreakdown || {};
        const twdCash = fieldValue("sinopacBalance", breakdown.sinopacBalance);
        const usdCash = fieldValue("cashUSD", currentAccounts.cashUSD);
        const totalCash = Math.max(0, Math.round(twdCash + usdCash * currentFxRate));
        const emergencyFund = Math.min(EMERGENCY_FUND_TARGET, totalCash);
        const investmentReserve = Math.max(0, totalCash - emergencyFund);
        const totalFinancialAssets = stockAssetsTWD + totalCash;
        const cashRatio = totalFinancialAssets ? (totalCash / totalFinancialAssets) * 100 : 0;
        document.getElementById("calculatedTotalCash").textContent = money.format(totalCash);
        document.getElementById("calculatedEmergencyFund").textContent = money.format(emergencyFund);
        document.getElementById("calculatedInvestmentReserve").textContent = money.format(investmentReserve);
        document.getElementById("calculatedCashRatio").textContent = `${cashRatio.toFixed(1)}%`;
      }

      async function loadCalculationBase() {
        try {
          const [accountsResponse, portfolioResponse] = await Promise.all([fetch("/api/accounts"), fetch("/api/portfolio")]);
          const accountsPayload = await accountsResponse.json();
          const portfolioPayload = await portfolioResponse.json();
          currentAccounts = accountsPayload.accounts || {};
          const portfolio = portfolioPayload.portfolio || {};
          currentFxRate = Number(portfolio.fxRate) || 0;
          const summary = portfolio.summary || {};
          stockAssetsTWD = Math.max(0, Number(summary.totalAssets || 0) - Number(summary.cash || 0));
        } catch {
          setStatus("即時摘要暫時無法讀取；仍可填寫並儲存資產。", "error");
        }
        renderCalculations();
      }

      function formatSavedAt(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const year = rocYear(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${year}/${month}/${day} ${hour}:${minute}`;
      }

      function setupMonthSelectors() {
        const current = currentTaiwanDate();
        const years = Array.from({ length: 16 }, (_, index) => current.year - 10 + index);
        financeYear.innerHTML = years
          .map((year) => `<option value="${year}" ${year === current.year ? "selected" : ""}>${rocYear(year)} 年</option>`)
          .join("");
        financeMonth.innerHTML = Array.from({ length: 12 }, (_, index) => {
          const month = String(index + 1).padStart(2, "0");
          return `<option value="${month}" ${month === current.month ? "selected" : ""}>${index + 1} 月</option>`;
        }).join("");
      }

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      function savedStatus(prefix, savedAt) {
        const savedTime = formatSavedAt(savedAt);
        return savedTime ? `${prefix}。已保存，最後同步：${savedTime}` : `${prefix}。已保存`;
      }

      function clearDashboardCache() {
        try {
          localStorage.removeItem("wealthDashboardLastCore");
          localStorage.removeItem("wealthDashboardLastFinanceData");
          localStorage.setItem("wealthDashboardRefreshRequired", new Date().toISOString());
        } catch {
          // Cache cleanup should never block asset updates.
        }
      }

      function renderResult(payload) {
        const rows = [
          ["永豐台幣現金", money.format(payload.cashTWD || 0)],
          ["Firstrade 現金", usdMoney.format(payload.cashUSD || 0)],
          ["Firstrade 現金折合台幣", money.format(payload.cashUSDTWD || 0)],
          ["現金資產合計", money.format(payload.cashTotalTWD || 0)],
          ["總資產", money.format(payload.totalAssets || 0)],
          ["淨資產", money.format(payload.netWorth || 0)],
        ];
        if (payload.accountBreakdown && Object.keys(payload.accountBreakdown).length) {
          rows.push(
            ["永豐餘額", money.format(payload.accountBreakdown.sinopacBalance || 0)],
          );
        }
        if (payload.monthlyFinance) {
          rows.push(
            ["月份收入", money.format(payload.monthlyFinance.income || 0)],
            ["月份支出", money.format(payload.monthlyFinance.expense || 0)],
          );
        }
        resultGrid.innerHTML = rows
          .map(([label, value]) => `<article class="result-box"><span>${label}</span><strong>${value}</strong></article>`)
          .join("");
        resultCard.hidden = false;
      }

      async function readApiPayload(response, fallbackMessage) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { detail: fallbackMessage };
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus("更新中...");
        try {
          const data = new FormData(form);
          data.set("month", `${financeYear.value}-${financeMonth.value}`);
          const response = await fetch("/api/update-asset-snapshot", { method: "POST", body: data });
          const payload = await readApiPayload(response, "資產更新失敗，請重新整理或確認登入狀態。");
          if (!response.ok) throw new Error(payload.detail || "資產更新失敗，請重新整理或確認登入狀態。");
          clearDashboardCache();
          renderResult(payload);
          const preservedNote = "未填欄位已維持原資料";
          setStatus(savedStatus(`${payload.monthlyFinance ? "資產 / 月份統計 / 資金水位已更新" : "資產 / 資金水位已更新"}，${preservedNote}，回首頁即可看到最新數字`, payload.savedAt), "success");
        } catch (error) {
          setStatus(`${error.message || "資產更新失敗，請稍後再試。"} 你剛輸入的內容已保留，不用重打。`, "error");
        } finally {
          submitButton.disabled = false;
        }
      });
      form.addEventListener("input", (event) => {
        if (["sinopacBalance", "cashUSD"].includes(event.target.name)) renderCalculations();
      });
      document.getElementById("snapshotDate").textContent = currentTaiwanDateLabel();
      setupMonthSelectors();
      loadCalculationBase();
    </script>
  </body>
</html>
