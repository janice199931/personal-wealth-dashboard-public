<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>更新資產快照</title>
    <style>
      :root {
        color-scheme: light;
        --surface: rgba(255, 253, 250, 0.9);
        --ink: #4d3730;
        --muted: #8d746c;
        --line: rgba(204, 154, 143, 0.2);
        --glass-border: rgba(226, 173, 162, 0.24);
        --shadow: 0 14px 34px rgba(158, 103, 88, 0.09);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
        background:
          radial-gradient(circle at 58% 12%, rgba(255, 210, 210, 0.46), transparent 34%),
          radial-gradient(circle at 88% 4%, rgba(241, 222, 205, 0.6), transparent 24%),
          linear-gradient(180deg, #fff8f3 0%, #fff2ee 48%, #f9eadf 100%);
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .card, form {
        background:
          linear-gradient(135deg, rgba(255, 253, 250, 0.96), rgba(255, 238, 237, 0.62)),
          var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card { padding: 22px; margin-bottom: 18px; }
      .hero-card { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
      h1 { margin: 0 0 8px; font-size: clamp(30px, 5vw, 48px); line-height: 1; }
      p { color: var(--muted); line-height: 1.7; }
      a { color: #b86866; font-weight: 900; text-decoration: none; }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        padding: 22px;
      }

      label { display: grid; gap: 8px; color: #d17f87; font-size: 13px; font-weight: 800; }
      input, button {
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 12px 14px;
        color: var(--ink);
        background: rgba(255, 253, 250, 0.82);
        font: inherit;
      }
      input:focus { outline: 2px solid rgba(209, 127, 135, 0.38); outline-offset: 2px; }
      button {
        cursor: pointer;
        font-weight: 900;
        background: linear-gradient(135deg, rgba(246, 183, 183, 0.92), rgba(255, 215, 168, 0.72));
        box-shadow: var(--shadow);
      }
      button:disabled { cursor: wait; opacity: 0.58; }

      .full { grid-column: 1 / -1; }
      .actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .status { color: var(--muted); font-weight: 850; }
      .status.success { color: #557b4c; }
      .status.error { color: #b84a5f; }
      .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .result-box {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255, 253, 250, 0.72);
      }
      .result-box span { display: block; color: var(--muted); font-weight: 850; margin-bottom: 8px; }
      .result-box strong { font-size: 24px; }

      @media (max-width: 720px) {
        .hero-card, form, .result-grid { grid-template-columns: 1fr; display: grid; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>更新資產快照</h1>
          <p>更新現金、銀行與信用卡負債，並重新計算首頁資產數字。</p>
        </div>
        <a href="./index.html">← 回到首頁</a>
      </section>

      <form id="snapshotForm">
        <label>
          現金
          <input name="cash" type="number" step="1" min="0" />
        </label>
        <label>
          銀行
          <input name="bank" type="number" step="1" min="0" />
        </label>
        <label>
          信用卡負債
          <input name="creditCardDebt" type="number" step="1" min="0" />
        </label>
        <label>
          MOZE CSV
          <input name="csv" type="file" accept=".csv,text/csv" />
        </label>
        <label class="full">
          帳戶總覽截圖
          <input name="image" type="file" accept="image/*" />
        </label>
        <div class="actions full">
          <span class="status" id="statusText">請填寫現金、銀行、信用卡負債，或上傳 CSV / 截圖。</span>
          <button id="submitButton" type="submit">更新資產快照</button>
        </div>
      </form>

      <section class="card" id="resultCard" hidden>
        <div class="result-grid" id="resultGrid"></div>
      </section>
    </main>
    <script>
      const form = document.getElementById("snapshotForm");
      const statusText = document.getElementById("statusText");
      const submitButton = document.getElementById("submitButton");
      const resultCard = document.getElementById("resultCard");
      const resultGrid = document.getElementById("resultGrid");
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      function renderResult(payload) {
        const rows = [
          ["現金 + 銀行", money.format(payload.cashTWD || 0)],
          ["總資產", money.format(payload.totalAssets || 0)],
          ["淨資產", money.format(payload.netWorth || 0)],
        ];
        resultGrid.innerHTML = rows
          .map(([label, value]) => `<article class="result-box"><span>${label}</span><strong>${value}</strong></article>`)
          .join("");
        resultCard.hidden = false;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus("更新中...");
        try {
          const data = new FormData(form);
          const response = await fetch("/api/update-asset-snapshot", { method: "POST", body: data });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "資產快照更新失敗");
          renderResult(payload);
          setStatus("資產快照已更新，回首頁即可看到最新數字。", "success");
        } catch (error) {
          setStatus(error.message || "資產快照更新失敗", "error");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
