<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>更新資產</title>
    <link rel="stylesheet" href="./form-pages.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <main>
      <section class="card hero-card">
        <div>
          <h1>更新資產</h1>
          <p>更新資金水位、各銀行餘額、信用卡負債，也可以手動記錄每月收入、支出與轉入永豐。</p>
        </div>
        <a href="./index.html">← 回到首頁</a>
      </section>

      <form id="snapshotForm">
        <label>
          郵局餘額
          <input name="postOfficeBalance" type="number" step="1" min="0" placeholder="薪資入帳帳戶" />
        </label>
        <label>
          永豐餘額
          <input name="sinopacBalance" type="number" step="1" min="0" placeholder="投資扣款帳戶" />
        </label>
        <label>
          現金
          <input name="availableCash" type="number" step="1" min="0" />
        </label>
        <label>
          美股帳戶現金（USD）
          <input name="cashUSD" type="number" step="0.01" min="0" placeholder="例如 1250.50" />
        </label>
        <label>
          信用卡負債
          <input name="creditCardDebt" type="number" step="1" min="0" />
        </label>
        <label>
          月份收入
          <input name="monthlyIncome" type="number" step="1" min="0" placeholder="例如 60000" />
        </label>
        <label>
          月份支出
          <input name="monthlyExpense" type="number" step="1" min="0" placeholder="例如 25000" />
        </label>
        <label>
          統計年份
          <select id="financeYear"></select>
        </label>
        <label>
          統計月份
          <select id="financeMonth"></select>
        </label>
        <details class="advanced-fields full">
          <summary>進階欄位</summary>
          <div>
            <label>
              緊急預備金
              <input name="emergencyFund" type="number" step="1" min="0" placeholder="100000" />
            </label>
            <label>
              投資預備金
              <input name="investmentReserve" type="number" step="1" min="0" placeholder="150000" />
            </label>
            <label>
              其他銀行餘額
              <input name="otherBankBalance" type="number" step="1" min="0" placeholder="不含郵局與永豐" />
            </label>
            <label>
              MOZE CSV
              <input name="csv" type="file" accept=".csv,text/csv" />
            </label>
            <label class="full">
              帳戶總覽截圖
              <input name="image" type="file" accept="image/*" />
            </label>
          </div>
        </details>
        <div class="actions full">
          <span class="status" id="statusText">可只填有異動的欄位；空白欄位會維持原資料，不會歸零。</span>
          <button id="submitButton" type="submit">更新資產</button>
        </div>
      </form>

      <section class="card" id="resultCard" hidden>
        <div class="result-grid" id="resultGrid"></div>
      </section>
    </main>
    <script>
      const form = document.getElementById("snapshotForm");
      const statusText = document.getElementById("statusText");
      const submitButton = document.getElementById("submitButton");
      const resultCard = document.getElementById("resultCard");
      const resultGrid = document.getElementById("resultGrid");
      const financeYear = document.getElementById("financeYear");
      const financeMonth = document.getElementById("financeMonth");
      const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
      const usdMoney = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 });

      function rocYear(year) {
        return Number(year) - 1911;
      }

      function currentTaiwanDate() {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
        }).format(new Date()).split("-");
        return { year: Number(parts[0]), month: parts[1] };
      }

      function formatSavedAt(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const year = rocYear(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${year}/${month}/${day} ${hour}:${minute}`;
      }

      function setupMonthSelectors() {
        const current = currentTaiwanDate();
        const years = Array.from({ length: 16 }, (_, index) => current.year - 10 + index);
        financeYear.innerHTML = years
          .map((year) => `<option value="${year}" ${year === current.year ? "selected" : ""}>${rocYear(year)} 年</option>`)
          .join("");
        financeMonth.innerHTML = Array.from({ length: 12 }, (_, index) => {
          const month = String(index + 1).padStart(2, "0");
          return `<option value="${month}" ${month === current.month ? "selected" : ""}>${index + 1} 月</option>`;
        }).join("");
      }

      function setStatus(message, tone = "") {
        statusText.textContent = message;
        statusText.className = `status${tone ? ` ${tone}` : ""}`;
      }

      function savedStatus(prefix, savedAt) {
        const savedTime = formatSavedAt(savedAt);
        return savedTime ? `${prefix}。已保存，最後同步：${savedTime}` : `${prefix}。已保存`;
      }

      function clearDashboardCache() {
        try {
          localStorage.removeItem("wealthDashboardLastCore");
          localStorage.removeItem("wealthDashboardLastFinanceData");
          localStorage.setItem("wealthDashboardRefreshRequired", new Date().toISOString());
        } catch {
          // Cache cleanup should never block asset updates.
        }
      }

      function renderResult(payload) {
        const rows = [
          ["台幣流動資金", money.format(payload.cashTWD || 0)],
          ["美股帳戶現金", usdMoney.format(payload.cashUSD || 0)],
          ["美元現金折合台幣", money.format(payload.cashUSDTWD || 0)],
          ["現金資產合計", money.format(payload.cashTotalTWD || 0)],
          ["總資產", money.format(payload.totalAssets || 0)],
          ["淨資產", money.format(payload.netWorth || 0)],
        ];
        if (payload.accountBreakdown && Object.keys(payload.accountBreakdown).length) {
          rows.push(
            ["郵局餘額", money.format(payload.accountBreakdown.postOfficeBalance || 0)],
            ["永豐餘額", money.format(payload.accountBreakdown.sinopacBalance || 0)],
            ["其他銀行餘額", money.format(payload.accountBreakdown.otherBankBalance || payload.bank || 0)],
            ["緊急預備金", money.format(payload.accountBreakdown.emergencyFund || 0)],
            ["投資預備金", money.format(payload.accountBreakdown.investmentReserve || 0)],
            ["現金", money.format(payload.accountBreakdown.availableCash || 0)],
          );
        }
        if (payload.monthlyFinance) {
          rows.push(
            ["月份收入", money.format(payload.monthlyFinance.income || 0)],
            ["月份支出", money.format(payload.monthlyFinance.expense || 0)],
          );
        }
        resultGrid.innerHTML = rows
          .map(([label, value]) => `<article class="result-box"><span>${label}</span><strong>${value}</strong></article>`)
          .join("");
        resultCard.hidden = false;
      }

      async function readApiPayload(response, fallbackMessage) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { detail: fallbackMessage };
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus("更新中...");
        try {
          const data = new FormData(form);
          data.set("month", `${financeYear.value}-${financeMonth.value}`);
          const response = await fetch("/api/update-asset-snapshot", { method: "POST", body: data });
          const payload = await readApiPayload(response, "資產更新失敗，請重新整理或確認登入狀態。");
          if (!response.ok) throw new Error(payload.detail || "資產更新失敗，請重新整理或確認登入狀態。");
          clearDashboardCache();
          renderResult(payload);
          const preservedNote = "未填欄位已維持原資料";
          setStatus(savedStatus(`${payload.monthlyFinance ? "資產 / 月份統計 / 資金水位已更新" : "資產 / 資金水位已更新"}，${preservedNote}，回首頁即可看到最新數字`, payload.savedAt), "success");
        } catch (error) {
          setStatus(`${error.message || "資產更新失敗，請稍後再試。"} 你剛輸入的內容已保留，不用重打。`, "error");
        } finally {
          submitButton.disabled = false;
        }
      });
      setupMonthSelectors();
    </script>
  </body>
</html>
